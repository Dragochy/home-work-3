<!DOCTYPE html>
<html>
<head>
	<title></title> 
</head>
<style>
    table {
    border:1px solid #b3adad;
    border-collapse:collapse;
    padding:5px;
}
table th {
    border:1px solid #b3adad;
    padding:5px;
    background: #ffffff;
    color: #000000;
}
table td {
    border:1px solid #b3adad;
    text-align:center;
    padding:5px;
    background: #ffffff;
    color: #080808;
}
</style>
<body>
    <table>
        <thead>
			<tr>
				<th colspan="3"></th>
				<th>Субъект</th>
				<th>Объект</th>
			</tr>
		</thead>
		<tbody>
            <tr>
                <td rowspan="5">Единственное число</td>
                <td colspan="2">1-e лицо</td>
				<td >Я</td>
				<td >Меня</td>
			</tr>
            <tr>
                <td colspan="2">2-e лицо</td>
				<td >ты</td>
				<td >тебя</td>
			</tr>
            <tr>
                <td rowspan="3">3-e лицо</td>
                <td >он</td>
				<td >он</td>
				<td >его</td>
			</tr>
            <tr>
                <td>она</td>
				<td >она</td>
				<td >ее</td>
			</tr>
            <tr>
                <td>оно</td>
				<td >оно</td>
				<td >его</td>
			</tr>
            <tr>
                <td rowspan="3">Множественное число</td>
                <td colspan="2">1-e лицо</td>
				<td >мы</td>
				<td >нас</td>
			</tr>
            <tr>
                <td colspan="2">2-e лицо</td>
				<td >вы</td>
				<td >вас</td>
			</tr>
            <tr>
                <td colspan="2">2-e лицо</td>
				<td >они</td>
				<td >их</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
